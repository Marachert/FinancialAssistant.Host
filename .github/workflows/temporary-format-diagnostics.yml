name: Temporary format diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/temporary-format-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnose-format:
    name: Capture dotnet format patch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore FinancialAssistant.Backend.sln

      - name: Capture formatter output
        id: format
        shell: bash
        run: |
          set +e
          mkdir -p FormatResults
          dotnet format FinancialAssistant.Backend.sln --no-restore --verbosity diagnostic 2>&1 | tee FormatResults/format.log
          status=${PIPESTATUS[0]}
          git diff -- . > FormatResults/format.patch
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload formatter diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temporary-format-diagnostics
          path: FormatResults/*
          if-no-files-found: error

      - name: Fail when formatting changed files
        if: steps.format.outputs.status != '0'
        run: exit 1
